replicaCount: 1

image:
  repository: pi-1.local:5000/gateway-monitor
  pullPolicy: IfNotPresent
  tag: "local"

service:
  type: ClusterIP
  port: 9093
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9093"
    prometheus.io/path: "/metrics"

ingress:
  enabled: true
  className: traefik
  host: gateway-monitor.pi-1.local
  path: /metrics
  pathType: Prefix

resources: {}

podAnnotations: {}

metrics:
  enabled: true
  port: 9093

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

env:
  GATEWAY_IP: "8.8.8.8"
  WAN_TARGET: "1.1.1.1"
  INTERVAL_SECONDS: "2"
