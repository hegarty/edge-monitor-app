replicaCount: 1

image:
  repository: pi-1.local:5000/alert-receiver
  pullPolicy: IfNotPresent
  tag: "local"

service:
  type: ClusterIP
  port: 9094
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9094"
    prometheus.io/path: "/metrics"

ingress:
  enabled: true
  className: traefik
  host: alert-receiver.pi-1.local
  path: /metrics
  pathType: Prefix

resources: {}

podAnnotations: {}

metrics:
  enabled: true
  port: 9094

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

secretName: alert-receiver-secrets

env:
  PORT: "9094"
  PROMETHEUS_URL: "http://prometheus-server.monitoring.svc.cluster.local:9090"
  PROMETHEUS_LOOKBACK: "30m"
  PROMETHEUS_TIMEOUT: "10s"
  LLM_TIMEOUT: "30s"
  JOB_QUEUE_SIZE: "32"
  WORKER_CONCURRENCY: "2"
  MAX_STORED_ANALYSES: "25"
  # Example:
  # [
  #   {"name":"chatgpt","type":"openai","model":"gpt-4.1-mini","api_key_env":"OPENAI_API_KEY"},
  #   {"name":"bedrock","type":"bedrock","model":"anthropic.claude-3-5-sonnet-20241022-v2:0","region":"us-east-1"},
  #   {"name":"pi-local","type":"ollama","model":"llama3.2","base_url":"http://ollama.alert-receiver.svc.cluster.local:11434"}
  # ]
  LLM_BACKENDS_JSON: "[]"
